services:
  nginx:
    image: nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  server:
    build: .
    env_file:
      - ./.env
    ports:
      - "7000:3000"
    environment:
      - SERVER_NAME="first server"

  
  server2:
    build: .
    env_file:
      - ./.env
    ports:
      - "7001:3000"
    environment:
      - SERVER_NAME="second server"

  server3:
    build: .
    env_file:
      - ./.env
    ports:
      - "7002:3000"
    environment:
      - SERVER_NAME="third server"
    

  